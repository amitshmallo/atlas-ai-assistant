name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@localhost:5432/atlas
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Apply migrations
        run: alembic upgrade head

      - name: Test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck and build
        working-directory: frontend
        run: npm run build

  deploy:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: Azure/setup-azd@v2

      - name: Log in to Azure (OIDC, no stored secret)
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

      - name: Configure azd environment
        run: |
          azd env new "${{ secrets.AZURE_ENV_NAME }}" --no-prompt
          azd env set AZURE_SUBSCRIPTION_ID "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          azd env set AZURE_LOCATION "${{ secrets.AZURE_LOCATION }}"
          azd env set AZURE_PRINCIPAL_ID "${{ secrets.AZURE_PRINCIPAL_ID }}"
          azd env set AZURE_PRINCIPAL_TYPE ServicePrincipal
          azd env set POSTGRES_ADMIN_PASSWORD "${{ secrets.POSTGRES_ADMIN_PASSWORD }}"
          azd env set ENTRA_TENANT_ID "${{ secrets.ENTRA_TENANT_ID }}"
          azd env set ENTRA_API_CLIENT_ID "${{ secrets.ENTRA_API_CLIENT_ID }}"
          azd env set ENTRA_API_CLIENT_SECRET "${{ secrets.ENTRA_API_CLIENT_SECRET }}"
          azd env set AI_FOUNDRY_MODEL_VERSION "${{ secrets.AI_FOUNDRY_MODEL_VERSION }}"

      - name: Deploy (azd up — provisions infra + deploys the API image)
        run: azd up --no-prompt
