server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to index.html rather
    # than 404ing, since MSAL's redirect handling and any app routes are
    # resolved by the React app itself, not the web server.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
